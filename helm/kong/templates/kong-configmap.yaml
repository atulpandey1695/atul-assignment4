apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-dbless-config
data:
  kong.yaml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: user-service
        url: http://user-service.default.svc.cluster.local:5000
        routes:
          - name: login-route
            paths:
              - /login
            strip_path: false
          - name: health-route
            paths:
              - /health
            strip_path: false
          - name: verify-route
            paths:
              - /verify
            strip_path: false
          - name: users-route
            paths:
              - /users
            strip_path: false
            plugins:
              - name: jwt
                config:
                  claims_to_verify:
                    - exp
              - name: rate-limiting
                config:
                  policy: local
                  minute: {{ .Values.kong.rateLimit.minute }}
                  limit_by: ip
              - name: ip-restriction
                config:
                  allow:
{{- range .Values.kong.ipWhitelist }}
                    - {{ . }}
{{- end }}

    consumers:
      - username: app-user
        jwt_secrets:
          - key: {{ .Values.kong.jwt.key | quote }}
            algorithm: HS256
            secret: {{ .Values.kong.jwt.secret | quote }}

    plugins:
      - name: pre-function
        config:
          access:
            - |
{{ .Files.Get "plugins/custom.lua" | indent 14 }}
